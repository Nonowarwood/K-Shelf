<!-- ================= K-SHELF LANDING (écran déconnecté) =================
     À COLLER dans index.html, juste après la balise <body>.
     Rien d'autre à ajouter : welcome.html embarque déjà three.js + les polices.
     Assure-toi que welcome.html est bien à la racine du repo (à côté d'index.html).
====================================================================== -->
<div id="kl-overlay">
  <iframe id="kl-frame" src="welcome.html" title="k-shelf" loading="eager"></iframe>
</div>
<style>
  #kl-overlay{position:fixed;inset:0;z-index:99999;display:none;background:#060608}
  #kl-frame{width:100%;height:100%;border:0;display:block}
</style>
<script>
(function(){
  var ov = document.getElementById('kl-overlay');
  var demo = false, shown = null, ready = false;

  function show(){ if(shown===true)return; shown=true; ov.style.display='block'; document.body.style.overflow='hidden'; }
  function hide(){ if(shown===false)return; shown=false; ov.style.display='none'; document.body.style.overflow=''; }

  function sync(){
    if(!ready) return;
    var user = window._currentUser || null;
    if(user && demo) demo = false;          // connecté -> on annule le mode démo
    (!user && !demo) ? show() : hide();     // déconnecté (et pas en démo) -> on montre le landing
  }

  // Petite période de grâce pour laisser Firebase résoudre la session
  // (évite un flash du landing pour un utilisateur déjà connecté).
  setTimeout(function(){ ready = true; sync(); }, 700);
  setInterval(sync, 300);

  // Messages envoyés par welcome.html (les boutons du landing)
  window.addEventListener('message', function(e){
    var d = e.data || {};
    if(d.source !== 'k-shelf-landing') return;
    if(d.type === 'signin'){ demo = false; window.signInWithGoogle && window.signInWithGoogle(); }
    else if(d.type === 'demo'){ demo = true; hide(); window.loadDemoCollection && window.loadDemoCollection(); }
  });

  // Contrôle manuel si besoin : window.__klanding.show() / .hide()
  window.__klanding = { show: show, hide: function(){ demo = true; hide(); } };
})();
</script>
<!-- ===================== FIN K-SHELF LANDING ===================== -->
